# Общий LLM-шлюз: LiteLLM + Postgres (данные платформы) + Redis (счётчики LB + кэш).
# Деплой: отдельный LXC на сервере, доступ только по LAN. Dev: Docker Desktop на Mac.

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    ports:
      # LAN-only: LXC без публичного IP. Если нужно жёстко ограничить интерфейсом —
      # замени на "<lan-ip>:4000:4000". Наружу НЕ публиковать (только через reverse-proxy с TLS).
      - "4000:4000"
    env_file: .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    mem_limit: 1536m       # 512m/1g → OOM (exit 137) на старте LiteLLM; выросло после подключения Langfuse-коллбэка
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # в образе нет curl — проверяем питоном, он точно есть
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - pg_data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # requirepass — пароль; maxmemory + LRU, чтобы кэш не разъедал RAM LXC
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
