# ──────────────────────────────────────────────────────────────────────────
# Конфиг LiteLLM — только настройки маршрутизации и общие параметры.
# Модели управляются через UI/API (store_model_in_db: true) и хранятся в Postgres.
# Этот файл НЕ содержит model_list — чтобы не было конфликта с UI-моделями.
#
# ВАЖНО: процесс читает этот файл ОДИН раз при старте.
#        после правки → `docker compose restart litellm` (не `up -d`).
# ──────────────────────────────────────────────────────────────────────────

router_settings:
  # выбирает источник с запасом по rpm/tpm (нужен Redis); так размазывается упор в лимит провайдера
  routing_strategy: usage-based-routing-v2
  redis_host: redis
  redis_port: 6379
  redis_password: os.environ/REDIS_PASSWORD

  num_retries: 3            # повторов на одном источнике (с backoff, уважает Retry-After)
  timeout: 120              # секунд на запрос
  allowed_fails: 3          # после стольких сбоев источник уходит в cooldown
  cooldown_time: 30         # на сколько секунд выводим упавший источник из ротации

  # если основной провайдер недоступен — переключаемся на резервный
  fallbacks:
    - gpt-4.1-mini: ["gpt-4.1-mini-fallback"]       # OpenRouter упал → nano-gpt
    - gpt-4.1-mini-fallback: ["gpt-4.1-mini"]        # и обратно
  # переключение при переполнении контекста (пример; включи, когда добавишь модель с большим окном):
  # context_window_fallbacks:
  #   - gpt-4.1-mini: ["gpt-4.1"]

litellm_settings:
  drop_params: true         # тихо отбрасывать неподдерживаемые провайдером параметры
  callbacks: ["prometheus"] # включает счётчики в памяти, которые отдаёт /metrics (Этап 2 мониторинга)
  # кэш ответов в Redis (экономия токенов на повторах) — включить при желании:
  # cache: true
  # cache_params:
  #   type: redis
  #   host: redis
  #   port: 6379
  #   password: os.environ/REDIS_PASSWORD
  # трейсинг всех вызовов в Langfuse — читает LANGFUSE_HOST/PUBLIC_KEY/SECRET_KEY из .env
  success_callback: ["langfuse"]
  # автотеги на каждый трейс: алиас ключа (Ragv2/OpenClaw/...) — чтобы фильтровать
  # трейсы по клиенту, включая будущих, без ручной настройки каждого ключа
  langfuse_default_tags: ["user_api_key_alias", "cache_hit"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY  # админ + дефолтный доступ; клиентам раздаём virtual keys
  database_url: os.environ/DATABASE_URL      # Postgres: ключи, бюджеты, история расходов
  store_model_in_db: true                    # модели/ключи можно менять через UI/API без перезапуска
